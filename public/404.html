<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>toto-dashboard</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      // Takes a URL like https://USER.github.io/toto-dashboard/forms?x=1 and rewrites it
      // to https://USER.github.io/toto-dashboard/?/forms&x=1 so that index.html loads,
      // then the inline script in index.html restores the original URL via history.replaceState
      // before React Router boots — so BrowserRouter sees the right path.
      // segmentCount=1 means strip one path segment (the repo name "toto-dashboard").
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
